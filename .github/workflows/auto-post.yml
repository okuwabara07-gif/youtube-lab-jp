name: Auto Post Articles
on:
  schedule:
    - cron: '0 1 * * *'  # 毎日JST10時
  workflow_dispatch:
jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Generate articles
        run: node scripts/auto-generate.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AMAZON_TRACKING_ID: haircolorab22-22
          RAKUTEN_AFFILIATE_ID: 5253b9ed.08f9d938.5253b9ee.e71aefe8
      - name: Commit and push
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add content/
          git diff --staged --quiet || git commit -m "auto: add articles $(date +%Y-%m-%d)"
          git push
      - name: Deploy
        run: npm install && npx next build
        env:
          AMAZON_TRACKING_ID: haircolorab22-22
          RAKUTEN_AFFILIATE_ID: 5253b9ed.08f9d938.5253b9ee.e71aefe8
      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          force_orphan: true
